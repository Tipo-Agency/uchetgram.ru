name: Auto Deploy uchetgram.ru

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.SERVER_PATH }}
            git fetch origin
            git reset --hard origin/main
            npm install
            export VITE_TELEGRAM_BOT_TOKEN="${{ secrets.VITE_TELEGRAM_BOT_TOKEN }}"
            export VITE_TELEGRAM_CHAT_ID="${{ secrets.VITE_TELEGRAM_CHAT_ID }}"
            export VITE_TIPA_FUNNEL_ID="${{ secrets.VITE_TIPA_FUNNEL_ID }}"
            export VITE_TIPA_SOURCE_ID="${{ secrets.VITE_TIPA_SOURCE_ID }}"
            npm run build
            # Build successful! Files are in dist/
            # Nginx reload (если нужно) настраивается отдельно на сервере.

